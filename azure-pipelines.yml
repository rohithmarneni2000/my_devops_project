# Deploy to Azure Kubernetes Service
# Build and push image to Azure Container Registry; Deploy to Azure Kubernetes Service
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker
trigger:
  branches:
    include:
      - main

# Self-hosted Windows agent
pool:
  name: 'Default'

variables:
  acrName: 'rohithacr2026'
  acrLoginServer: 'rohithacr2026.azurecr.io'
  imageName: 'chatbot-app'
  aksCluster: 'chatbot-aks'
  resourceGroup: 'chatbot-rg'
  k8sNamespace: 'default'

stages:

# ── Stage 1: Build & Push Docker Image ───────────────────────────────────────
- stage: Build
  displayName: 'Build and Push Docker Image'
  jobs:
  - job: BuildPush
    displayName: 'Build & Push to ACR'
    steps:

    - task: AzureCLI@2
      displayName: 'Login to ACR'
      inputs:
        azureSubscription: 'Azure-Service-Connection'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr login --name $(acrName)

    - task: Docker@2
      displayName: 'Build Docker Image'
      inputs:
        command: 'build'
        dockerfile: 'docker/Dockerfile'
        repository: '$(acrLoginServer)/$(imageName)'
        tags: '$(Build.BuildId)'
        buildContext: '$(Build.SourcesDirectory)'

    - task: Docker@2
      displayName: 'Push Docker Image to ACR'
      inputs:
        command: 'push'
        repository: '$(acrLoginServer)/$(imageName)'
        tags: '$(Build.BuildId)'

# ── Stage 2: Deploy to AKS ───────────────────────────────────────────────────
- stage: Deploy
  displayName: 'Deploy to AKS'
  dependsOn: Build
  jobs:
  - job: Deploy
    displayName: 'Deploy to Kubernetes'
    steps:

    - task: AzureCLI@2
      displayName: 'Deploy to AKS'
      inputs:
        azureSubscription: 'Azure-Service-Connection'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials --resource-group $(resourceGroup) --name $(aksCluster)
          kubectl set image deployment/chatbot-deployment chatbot=$(acrLoginServer)/$(imageName):$(Build.BuildId)
          kubectl rollout status deployment/chatbot-deployment
